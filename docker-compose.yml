services:
  postgres:
    image: postgres:16
    container_name: sleepcommerce-db
    environment:
      POSTGRES_USER: sleepcommerce
      POSTGRES_PASSWORD: sleepcommerce123
      POSTGRES_DB: sleepcommerce
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: sleepcommerce-cache
    ports:
      - "6379:6379"

  aspire-dashboard:
    image: mcr.microsoft.com/dotnet/aspire-dashboard:9.0
    container_name: sleepcommerce-dashboard
    environment:
      DOTNET_DASHBOARD_UNSECURED_ALLOW_ANONYMOUS: "true"
    ports:
      - "18888:18888"
      - "4317:18889"

volumes:
  pgdata:
