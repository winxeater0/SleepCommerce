services:
  postgres:
    image: postgres:16
    container_name: sleepcommerce-db
    environment:
      POSTGRES_USER: sleepcommerce
      POSTGRES_PASSWORD: sleepcommerce123
      POSTGRES_DB: sleepcommerce
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
